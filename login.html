<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommandaBar - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#111827] font-sans antialiased min-h-screen flex items-center justify-center px-6">

    <div class="bg-gray-800 w-full max-w-md p-8 rounded-3xl shadow-2xl border border-gray-700">
        
        <div class="flex items-center justify-center space-x-2 mb-8">
            <div class="bg-[#f97316] p-2.5 rounded-xl shadow-lg shadow-orange-500/20">
                <i class="fa-solid fa-utensils text-xl text-white"></i>
            </div>
            <span class="text-2xl font-black tracking-tight text-orange-500">Commanda<span class="text-white">Bar</span></span>
        </div>

        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold text-white tracking-tight">Acesse sua Conta</h2>
            <p class="text-sm text-gray-400 mt-1">Insira suas credenciais para entrar no painel</p>
        </div>

        <form onsubmit="event.preventDefault(); manipularLogin();" class="space-y-5">
    
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">E-mail</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="loginEmail" required placeholder="seu@estabelecimento.com" 
                           class="w-full pl-11 pr-4 py-3.5 bg-gray-700 border border-gray-600 rounded-xl text-sm text-white focus:outline-none focus:border-orange-500 transition">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Senha de Acesso</label>
                    <button type="button" onclick="recuperarSenha()" class="text-xs font-bold text-orange-500 hover:text-orange-600 transition cursor-pointer">
                        Esqueceu?
                    </button>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <i class="fa-solid fa-lock"></i> </span>
                    <input type="password" id="loginSenha" required placeholder="••••••••" 
                           class="w-full pl-11 pr-4 py-3.5 bg-gray-700 border border-gray-600 rounded-xl text-sm text-white focus:outline-none focus:border-orange-500 transition">
                </div>
            </div>

            <button type="submit"
                    class="w-full bg-[#f97316] hover:bg-orange-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-orange-500/10 flex items-center justify-center space-x-2 cursor-pointer">
                <span>Entrar no Sistema</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </form>

         <div class="text-center mt-4">
               <p class="text-sm text-gray-400">Não tem uma conta? <a href="cadastro.html" class="text-orange-500 font-bold hover:underline">Cadastre-se aqui</a></p>
         </div>

        <div class="mt-6 text-center border-t border-gray-700 pt-4">
            <a href="index.html" class="text-xs font-semibold text-gray-400 hover:text-orange-500 transition">
                <i class="fa-solid fa-arrow-left-long mr-1"></i> Voltar para a página inicial
            </a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="database.js?v=2"></script>
</body>
</html>
