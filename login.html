<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommandaBar - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#111827] font-sans antialiased min-h-screen flex items-center justify-center px-6">

    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl border border-gray-100">
        
        <div class="flex items-center justify-center space-x-2 mb-8">
            <div class="bg-[#f97316] p-2.5 rounded-xl shadow-lg shadow-orange-500/20">
                <i class="fa-solid fa-utensils text-xl text-white"></i>
            </div>
            <span class="text-2xl font-black tracking-tight text-orange-500">Commanda<span class="text-gray-900">Bar</span></span>
        </div>

        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Acesse sua Conta</h2>
            <p class="text-sm text-gray-500 mt-1">Insira suas credenciais para entrar no painel</p>
        </div>

        <form onsubmit="event.preventDefault(); manipularLogin();" class="space-y-5">
    
    <div>
        <input type="email" id="loginEmail" required placeholder="seu@estabelecimento.com" class="w-full ...">
    </div>

    <div>
        <input type="password" id="loginSenha" required placeholder="••••••••" class="w-full ...">
    </div>

    <button type="submit" class="w-full bg-[#f97316] ...">
        <span>Entrar no Sistema</span>
    </button>
</form>

        <div class="mt-6 text-center border-t pt-4">
            <a href="index.html" class="text-xs font-semibold text-gray-500 hover:text-orange-500 transition">
                <i class="fa-solid fa-arrow-left-long mr-1"></i> Voltar para a página inicial
            </a>
        </div>

    </div>

    <script>
        function executarLogin(event) {
            // Impede o recarregamento da página ao enviar o formulário
            event.preventDefault();

            // Captura as credenciais inseridas
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Salva o estado de autenticação no localStorage do navegador
            localStorage.setItem('usuarioLogado', 'true');

            // Redireciona perfeitamente para o painel de controle
            window.location.href = 'dashboard.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="database.js"></script>
</body>
</html>
