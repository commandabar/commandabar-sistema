<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommandaBar - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#111827] font-sans antialiased min-h-screen flex items-center justify-center px-6">

    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl border border-gray-100">
        
        <div class="flex items-center justify-center space-x-2 mb-8">
            <div class="bg-[#f97316] p-2.5 rounded-xl shadow-lg shadow-orange-500/20">
                <i class="fa-solid fa-utensils text-xl text-white"></i>
            </div>
            <span class="text-2xl font-black tracking-tight text-orange-500">Commanda<span class="text-gray-900">Bar</span></span>
        </div>

        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Acesse sua Conta</h2>
            <p class="text-sm text-gray-500 mt-1">Insira suas credenciais para entrar no painel</p>
        </div>

        <form onsubmit="executarLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">E-mail Corporativo</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <input type="email" id="loginEmail" required placeholder="seu@estabelecimento.com" 
                        class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-orange-500 focus:bg-white transition">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">Senha de Acesso</label>
                    <a href="#" onclick="alert('Recuperação de senha temporariamente indisponível.')" class="text-xs font-bold text-orange-500 hover:text-orange-600 transition">Esqueceu?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="loginSenha" required placeholder="••••••••" 
                        class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-orange-500 focus:bg-white transition">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" onclick="manipularLogin()"
                    class="w-full bg-[#f97316] hover:bg-orange-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-orange-500/10 flex items-center justify-center space-x-2">
                    <span>Entrar no Sistema</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </div>

            <div class="text-center text-sm text-gray-500 pt-1">
                Não tem uma conta? 
                <a href="#" onclick="alert('Funcionalidade de cadastro será conectada em breve!')" class="font-bold text-orange-500 hover:text-orange-600 transition">
                    Cadastre-se aqui
                </a>
            </div>
        </form>

        <div class="mt-6 text-center border-t pt-4">
            <a href="index.html" class="text-xs font-semibold text-gray-500 hover:text-orange-500 transition">
                <i class="fa-solid fa-arrow-left-long mr-1"></i> Voltar para a página inicial
            </a>
        </div>

    </div>

    <script>
        function executarLogin(event) {
            // Impede o recarregamento da página ao enviar o formulário
            event.preventDefault();

            // Captura as credenciais inseridas
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Salva o estado de autenticação no localStorage do navegador
            localStorage.setItem('usuarioLogado', 'true');

            // Redireciona perfeitamente para o painel de controle
            window.location.href = 'dashboard.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="database.js"></script>
</body>
</html>
